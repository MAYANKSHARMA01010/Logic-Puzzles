name: my-pattern-env
version: "1.0"
description: "Logic pattern sequence guessing game for RL agents"

server:
	port: 7860
	health_endpoint: /health

tasks:
	- name: sequence_guess
		difficulty_levels: [easy, medium, hard]
		max_steps: 3

inference:
	script: inference.py
	required_env_vars:
		- HF_TOKEN
		- API_BASE_URL
		- MODEL_NAME
		- IMAGE_NAME
