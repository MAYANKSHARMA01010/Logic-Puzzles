name: forecast-audit-openenv
version: "1.0.0"
description: "Forecast and time-series quality auditing environment with deterministic grading and structured rewards."

# Endpoints that judges will call
endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"

# Action space
action_type: "object"
action_schema:
  type: "object"
  properties:
    operation:
      type: "string"
      enum: ["impute", "flag_anomaly", "accept", "repair_and_finalize", "escalate"]
      description: "Action type to apply to the current task"
    target_index:
      type: ["integer", "null"]
      description: "Index of the value being repaired or reviewed"
    predicted_value:
      type: ["number", "null"]
      description: "Imputed or repaired numeric value"
    severity:
      type: ["string", "null"]
      enum: ["low", "medium", "high", null]
      description: "Severity level for anomaly/escalation decisions"
    violated_constraints:
      type: "array"
      items:
        type: "string"
      description: "Constraints cited as violated"
    rationale:
      type: "string"
      description: "Short explanation for the selected action"
  required:
    - operation

# Observation space
observation_type: "object"
observation_schema:
  type: "object"
  properties:
    task_id:
      type: "string"
      description: "Unique task identifier"
    difficulty:
      type: "string"
      description: "Task difficulty: easy, medium, or hard"
    domain:
      type: "string"
      description: "Business domain: operations, finance, or energy"
    metric_name:
      type: "string"
      description: "Name of the monitored metric"
    timestamps:
      type: "array"
      items:
        type: "string"
      description: "Time labels for each value"
    values:
      type: "array"
      items:
        type: ["number", "null"]
      description: "Observed values including potential gaps or anomalies"
    issue_type:
      type: "string"
      description: "missing_value, anomaly, or invalid_forecast"
    constraints:
      type: "array"
      items:
        type: "string"
      description: "Operational/business constraints for the task"
    analyst_note:
      type: "string"
      description: "Context and guidance for the decision"
    step_count:
      type: "integer"
      description: "Current step count in the episode"
    max_steps:
      type: "integer"
      description: "Maximum allowed steps for the episode"
    history_summary:
      type: "string"
      description: "Historical trend context for the metric"

# Reward bounds
reward:
  min: 0.0
  max: 1.0
  
# Required environment variables
required_env_vars:
  - HF_TOKEN
  - API_BASE_URL
  - MODEL_NAME

# Docker image
docker:
  base_image: "python:3.11-slim"
  build_command: "docker build -t forecast-audit-openenv:latest ."
  run_command: "docker run --rm -p 7860:7860 forecast-audit-openenv:latest"
